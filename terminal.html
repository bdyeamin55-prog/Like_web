<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSR YEAMIN — Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#f0c040;--gold2:#ffd97a;--gold3:#c8960c;
  --pur:#9333ea;--pur2:#6d28d9;--pur3:#c084fc;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;
  --cyan:#67e8f9;--blue:#60a5fa;
  --bg:#05030c;--bg2:#0a0419;--bar:#080315;
  --border:rgba(240,192,64,.13);--text:#f0e8ff;--muted:#5a4878;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'JetBrains Mono','Courier New',monospace;color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* BG */
#bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(240,192,64,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(240,192,64,.016) 1px,transparent 1px);
  background-size:40px 40px;animation:gMove 40s linear infinite;}
@keyframes gMove{to{background-position:40px 40px;}}
#bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 45% at 20% 20%,rgba(147,51,234,.12) 0%,transparent 55%),
             radial-gradient(ellipse 50% 40% at 80% 80%,rgba(109,40,217,.1) 0%,transparent 55%);}
#vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 90% 85% at 50% 50%,transparent 20%,rgba(5,3,12,.92) 100%);}
#scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);}
#flicker{position:fixed;inset:0;z-index:2;pointer-events:none;animation:flk 10s ease-in-out infinite;opacity:0;background:rgba(147,51,234,.012);}
@keyframes flk{0%,94%,100%{opacity:0}95%{opacity:1}96.5%{opacity:0}98%{opacity:.6}}

/* TOP BAR */
.topbar{background:var(--bar);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:46px;position:relative;z-index:10;}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),var(--gold2),var(--gold3),transparent);opacity:.35;animation:barGlow 4s ease-in-out infinite;}
@keyframes barGlow{0%,100%{opacity:.25}50%{opacity:.55}}

.tb-l{display:flex;align-items:center;gap:8px;}
.wdot{width:12px;height:12px;border-radius:50%;transition:box-shadow .2s;cursor:default;flex-shrink:0;}
.wdot.r{background:#ff5f57;}.wdot.y{background:#febc2e;}.wdot.g{background:#28c840;}
.wdot:hover{filter:brightness(1.3);box-shadow:0 0 10px currentColor;}
.tb-brand{margin-left:12px;display:flex;align-items:center;gap:8px;}
.tb-brand-title{font-family:'Cinzel',serif;font-size:11px;color:rgba(240,192,64,.5);letter-spacing:3px;text-transform:uppercase;}
.tb-brand-title span{color:rgba(240,192,64,.85);}
.tb-divider{width:1px;height:16px;background:rgba(240,192,64,.2);}
.tb-sub{font-size:9px;color:rgba(192,132,252,.4);letter-spacing:2px;}

.tb-r{display:flex;align-items:center;gap:10px;}
.sbadge{font-size:9.5px;padding:3px 12px;border-radius:4px;letter-spacing:2px;border:1px solid;font-family:'JetBrains Mono',monospace;transition:all .2s;}
.sbadge.online{color:var(--green);border-color:rgba(74,222,128,.28);background:rgba(74,222,128,.06);}
.sbadge.loading{color:var(--yellow);border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.06);animation:bp 1.2s ease-in-out infinite;}
.sbadge.checking{color:var(--orange);border-color:rgba(251,146,60,.28);background:rgba(251,146,60,.06);animation:bp .8s ease-in-out infinite;}
@keyframes bp{0%,100%{opacity:1}50%{opacity:.35}}
.back-btn{color:var(--gold);text-decoration:none;font-size:10px;border:1px solid rgba(240,192,64,.28);padding:4px 13px;border-radius:4px;letter-spacing:2px;font-family:'JetBrains Mono',monospace;transition:all .2s;}
.back-btn:hover{background:rgba(240,192,64,.1);border-color:var(--gold);box-shadow:0 0 12px rgba(240,192,64,.25);}

/* TERMINAL HEADER */
.term-hdr{background:rgba(5,3,12,.97);border-bottom:1px solid rgba(240,192,64,.07);padding:7px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative;z-index:5;}
.term-hdr-l{display:flex;align-items:center;gap:14px;}
.term-label{font-size:9.5px;color:rgba(192,132,252,.4);letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.term-label::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--pur3);box-shadow:0 0 6px var(--pur3);animation:bp 1.6s ease-in-out infinite;}
#tokenCount{font-size:10px;color:rgba(240,192,64,.45);letter-spacing:1px;}
.clr-btn{background:transparent;border:1px solid rgba(240,192,64,.17);color:rgba(192,132,252,.45);font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.clr-btn:hover{border-color:var(--gold);color:var(--gold2);box-shadow:0 0 8px rgba(240,192,64,.18);}

/* SCREEN */
.terminal-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:3;}
.screen{flex:1;overflow-y:auto;padding:16px 20px;background:transparent;font-size:12.5px;line-height:1.78;}
.screen::-webkit-scrollbar{width:5px;}
.screen::-webkit-scrollbar-track{background:rgba(0,0,0,.3);}
.screen::-webkit-scrollbar-thumb{background:rgba(240,192,64,.18);border-radius:3px;}
.screen::-webkit-scrollbar-thumb:hover{background:rgba(240,192,64,.35);}

/* LINE COLORS */
.line{display:block;white-space:pre-wrap;word-break:break-all;padding:.5px 0;}
.line.sys{color:var(--pur3);}
.line.ok{color:var(--green);}
.line.err{color:var(--red);}
.line.warn{color:var(--yellow);}
.line.info{color:rgba(192,132,252,.3);}
.line.check{color:var(--orange);font-weight:500;}
.line.border{color:rgba(240,192,64,.18);}
.line.done{color:var(--green);font-weight:500;}
.line.sep{color:rgba(240,192,64,.1);}
.line.blank{color:transparent;user-select:none;height:6px;display:block;}
/* timestamp prefix color */
.line .ts{color:rgba(192,132,252,.25);font-size:10.5px;}

/* CURSOR */
.cur-blink{display:inline-block;width:8px;height:14px;background:var(--gold);box-shadow:0 0 8px var(--gold),0 0 18px rgba(240,192,64,.4);animation:curBlink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px;border-radius:1px;}
@keyframes curBlink{0%,100%{opacity:1}50%{opacity:0}}

/* BOTTOM BAR */
.bottombar{background:var(--bar);border-top:1px solid var(--border);padding:8px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative;z-index:10;}
.bottombar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);opacity:.3;}
.bb-l{font-family:'Cinzel',serif;font-size:9px;color:rgba(240,192,64,.25);letter-spacing:3px;text-transform:uppercase;}
.bb-r{display:flex;align-items:center;gap:18px;}
.bstat{font-size:10px;color:rgba(192,132,252,.3);letter-spacing:1px;}
.bstat em{font-style:normal;color:rgba(192,132,252,.65);}
.bstat.warn em{color:var(--yellow);}

@media(max-width:500px){
  .screen{font-size:11px;padding:10px 12px;}
  .tb-sub,.tb-divider{display:none;}
  .bb-r{gap:10px;}
}
</style>
</head>
<body>

<div id="bg-grid"></div><div id="bg-glow"></div>
<div id="vignette"></div><div id="scanlines"></div><div id="flicker"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-l">
    <div class="wdot r"></div><div class="wdot y"></div><div class="wdot g"></div>
    <div class="tb-brand">
      <div class="tb-brand-title">csr yeamin ~ <span>token-gen</span></div>
      <div class="tb-divider"></div>
      <div class="tb-sub">live terminal</div>
    </div>
  </div>
  <div class="tb-r">
    <div class="sbadge loading" id="statusBadge">● LOADING</div>
    <a href="/" class="back-btn">← BACK</a>
  </div>
</div>

<!-- TERMINAL -->
<div class="terminal-wrap">
  <div class="term-hdr">
    <div class="term-hdr-l">
      <div class="term-label">LIVE TOKEN GENERATION LOG</div>
      <span id="tokenCount">TOKENS: 0</span>
    </div>
    <button class="clr-btn" onclick="clearScreen()">[ CLEAR ]</button>
  </div>

  <div class="screen" id="screen">
    <span class="line sys">[SYSTEM] Connecting to token generator...</span>
    <span class="cur-blink" id="cursor"></span>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="bb-l">CSR Yeamin · Token Terminal</div>
  <div class="bb-r">
    <div class="bstat">TOKENS: <em id="statTokens">0</em></div>
    <div class="bstat warn" id="statRefresh">NEXT: <em>--:--:--</em></div>
    <div class="bstat">POLL: <em>3s</em></div>
  </div>
</div>

<script>
const screen=document.getElementById('screen');
const cursor=document.getElementById('cursor');
let lastLogId=0,lineCount=0;
const MAX=500;

function classify(msg){
  if(msg.includes('═')||msg.includes('╔')||msg.includes('╚')||msg.includes('╗')||msg.includes('╝'))return'border';
  if(msg.includes('──')||msg.includes('━━'))return'sep';
  if(msg===''||msg.trim()==='')return'blank';
  if(msg.includes('CHECKING TOKEN')||msg.includes('[!]'))return'check';
  if(msg.includes('[SYSTEM]'))return'sys';
  if(msg.includes('✓')||msg.includes('SUCCESS')||msg.includes('DONE')||msg.includes('COMPLETE')||msg.includes('valid')||msg.includes('Resuming')||msg.includes('OK |'))return'ok';
  if(msg.includes('[ERROR]')||msg.includes('✗')||msg.includes('FAILED')||msg.includes('Error')||msg.includes('expired'))return'err';
  if(msg.includes('[WARN]')||msg.includes('[FAIL]')||msg.includes('failed,'))return'warn';
  if(msg.includes('[DONE]')||msg.includes('[INFO]'))return'info';
  return'';
}

function appendLine(msg){
  if(cursor.parentNode)cursor.parentNode.removeChild(cursor);
  const span=document.createElement('span');
  const cls=classify(msg);
  span.className='line '+cls;
  if(msg===''||msg.trim()===''){span.innerHTML='&nbsp;';span.className='line blank';}
  else{span.textContent=msg;}
  screen.appendChild(span);
  screen.appendChild(document.createElement('br'));
  lineCount++;
  if(lineCount>MAX){const ch=screen.querySelectorAll('span.line,br');for(let i=0;i<20&&ch[i];i++)ch[i].remove();lineCount=Math.max(0,lineCount-20);}
  screen.appendChild(cursor);
  screen.scrollTop=screen.scrollHeight;
}

function clearScreen(){screen.innerHTML='';screen.appendChild(cursor);lineCount=0;appendLine('[SYSTEM] Screen cleared.');}

async function pollLogs(){
  try{const r=await fetch(`/logs/poll?after=${lastLogId}`);const d=await r.json();
    if(d.lines&&d.lines.length>0){d.lines.forEach(l=>appendLine(l.msg));lastLogId=d.last_id;}}catch(e){}
}

async function pollStatus(){
  try{
    const r=await fetch('/token_status');const d=await r.json();
    const cnt=d.total_tokens||0;const chk=d.checking_mode||false;const nTs=d.next_refresh_ts||0;
    document.getElementById('statTokens').textContent=cnt;
    document.getElementById('tokenCount').textContent='TOKENS: '+cnt;
    const badge=document.getElementById('statusBadge');
    if(chk){badge.className='sbadge checking';badge.textContent='⚠ CHECKING';}
    else if(cnt===0){badge.className='sbadge loading';badge.textContent='● LOADING';}
    else{badge.className='sbadge online';badge.textContent='● ONLINE  '+cnt+' TOKENS';}
    if(nTs>0){const now=Math.floor(Date.now()/1000);const diff=Math.max(0,nTs-now);const h=String(Math.floor(diff/3600)).padStart(2,'0');const m=String(Math.floor((diff%3600)/60)).padStart(2,'0');const s=String(diff%60).padStart(2,'0');document.getElementById('statRefresh').innerHTML='NEXT: <em>'+h+':'+m+':'+s+'</em>';}
  }catch(e){}
}

// INIT
(async()=>{
  try{const r=await fetch('/logs/all');const d=await r.json();
    if(d.lines&&d.lines.length>0){d.lines.forEach(l=>appendLine(l.msg));lastLogId=d.lines[d.lines.length-1].id;}
    else appendLine('[SYSTEM] Waiting for token generation to start...');}
  catch(e){appendLine('[SYSTEM] Server connecting...');}
})();

setInterval(pollLogs,3000);setInterval(pollStatus,5000);pollStatus();
</script>
</body>
</html>

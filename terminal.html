<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSR YEAMIN — Terminal</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0d0d0d;
    font-family: 'Courier New', Courier, monospace;
    color: #00ff88;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dot { width:12px; height:12px; border-radius:50%; }
  .dot.red    { background:#ff5f57; }
  .dot.yellow { background:#febc2e; }
  .dot.green  { background:#28c840; }
  .topbar-title {
    color: #aaa;
    font-size: 13px;
    letter-spacing: 2px;
    margin-left: 12px;
  }
  .topbar-right {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .back-btn {
    color: #00bfff;
    text-decoration: none;
    font-size: 12px;
    border: 1px solid #00bfff44;
    padding: 4px 12px;
    border-radius: 3px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .back-btn:hover {
    background: #00bfff22;
    border-color: #00bfff;
  }
  .status-badge {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 3px;
    letter-spacing: 1px;
    border: 1px solid;
  }
  .status-badge.online  { color:#28c840; border-color:#28c84044; background:#28c84011; }
  .status-badge.loading { color:#febc2e; border-color:#febc2e44; background:#febc2e11; animation: pulse 1s infinite; }
  .status-badge.checking{ color:#ff9500; border-color:#ff950044; background:#ff950011; animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ── TERMINAL BODY ── */
  .terminal-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .terminal-header {
    background: #111;
    border-bottom: 1px solid #1e1e1e;
    padding: 6px 16px;
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .terminal-header span { color: #00ff8844; }

  .terminal-screen {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    background: #0d0d0d;
    font-size: 13px;
    line-height: 1.8;
  }
  .terminal-screen::-webkit-scrollbar { width: 6px; }
  .terminal-screen::-webkit-scrollbar-track { background: #111; }
  .terminal-screen::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  /* ── LOG LINE COLORS ── */
  .line         { display: block; white-space: pre-wrap; word-break: break-all; }
  .line.sys     { color: #00bfff; }
  .line.ok      { color: #00ff88; }
  .line.err     { color: #ff5f57; }
  .line.warn    { color: #febc2e; }
  .line.info    { color: #aaaaaa; }
  .line.check   { color: #ff9500; font-weight: bold; }
  .line.border  { color: #00ff8844; }
  .line.done    { color: #00ff88; font-weight: bold; }
  .line.sep     { color: #333; }
  .line.blank   { color: transparent; user-select: none; }

  /* Blinking cursor */
  .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #00ff88;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── BOTTOM BAR ── */
  .bottombar {
    background: #111;
    border-top: 1px solid #1e1e1e;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    font-size: 11px;
  }
  .bottombar-left { color: #444; letter-spacing: 1px; }
  .bottombar-right {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .stat-item { color: #555; }
  .stat-item span { color: #00ff88; }
  .stat-item.warn-stat span { color: #febc2e; }

  .clear-btn {
    background: transparent;
    border: 1px solid #333;
    color: #555;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: #555; color: #aaa; }

  /* ── MOBILE ── */
  @media (max-width: 500px) {
    .terminal-screen { font-size: 11px; padding: 8px; }
    .topbar-title { font-size: 11px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <div class="topbar-title">csr yeamin ~ token-generator</div>
  </div>
  <div class="topbar-right">
    <div class="status-badge loading" id="statusBadge">● LOADING</div>
    <a href="/" class="back-btn">← BACK</a>
  </div>
</div>

<!-- TERMINAL -->
<div class="terminal-wrap">
  <div class="terminal-header">
    <span>LIVE TOKEN GENERATION LOG</span>
    <div style="display:flex;gap:12px;align-items:center">
      <span id="tokenCount">TOKENS: 0</span>
      <button class="clear-btn" onclick="clearScreen()">CLEAR</button>
    </div>
  </div>

  <div class="terminal-screen" id="screen">
    <span class="line sys">[SYSTEM] Connecting to token generator...</span>
    <span class="cursor-blink" id="cursor"></span>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="bottombar-left">CSR YEAMIN LIKE WEB  ·  TOKEN TERMINAL</div>
  <div class="bottombar-right">
    <div class="stat-item">TOKENS: <span id="statTokens">0</span></div>
    <div class="stat-item warn-stat" id="statRefresh">NEXT: <span>--:--:--</span></div>
    <div class="stat-item">POLL: <span>3s</span></div>
  </div>
</div>

<script>
const screen   = document.getElementById('screen');
const cursor   = document.getElementById('cursor');
let lastLogId  = 0;
let lineCount  = 0;
const MAX_LINES = 500;

// ── Line classifier ──────────────────────────────────────────
function classify(msg) {
  if (msg.includes('═') || msg.includes('╔') || msg.includes('╚') || msg.includes('╗') || msg.includes('╝')) return 'border';
  if (msg.includes('──') || msg.includes('━━')) return 'sep';
  if (msg === '' || msg.trim() === '') return 'blank';
  if (msg.includes('CHECKING TOKEN') || msg.includes('[!]')) return 'check';
  if (msg.includes('[SYSTEM]')) return 'sys';
  if (
    msg.includes('✓') || msg.includes('SUCCESS') ||
    msg.includes('DONE') || msg.includes('COMPLETE') ||
    msg.includes('valid') || msg.includes('Resuming') ||
    msg.includes('OK |')
  ) return 'ok';
  if (
    msg.includes('[ERROR]') || msg.includes('✗') ||
    msg.includes('FAILED') || msg.includes('Error') ||
    msg.includes('expired')
  ) return 'err';
  if (
    msg.includes('[WARN]') || msg.includes('[FAIL]') ||
    msg.includes('failed,')
  ) return 'warn';
  if (msg.includes('[DONE]') || msg.includes('[INFO]')) return 'info';
  return '';
}

// ── Append log line ──────────────────────────────────────────
function appendLine(msg) {
  // cursor সরাও
  if (cursor.parentNode) cursor.parentNode.removeChild(cursor);

  const span = document.createElement('span');
  span.className = 'line ' + classify(msg);
  span.textContent = msg;
  screen.appendChild(span);
  screen.appendChild(document.createElement('br'));
  lineCount++;

  // পুরনো লাইন ছাঁটো
  if (lineCount > MAX_LINES) {
    const children = screen.querySelectorAll('span.line, br');
    for (let i = 0; i < 20 && children[i]; i++) {
      children[i].remove();
    }
    lineCount = Math.max(0, lineCount - 20);
  }

  // cursor আবার যোগ করো
  screen.appendChild(cursor);
  screen.scrollTop = screen.scrollHeight;
}

function clearScreen() {
  screen.innerHTML = '';
  screen.appendChild(cursor);
  lineCount = 0;
  appendLine('[SYSTEM] Screen cleared.');
}

// ── Poll logs ────────────────────────────────────────────────
async function pollLogs() {
  try {
    const resp = await fetch(`/logs/poll?after=${lastLogId}`);
    const data = await resp.json();
    if (data.lines && data.lines.length > 0) {
      data.lines.forEach(l => appendLine(l.msg));
      lastLogId = data.last_id;
    }
  } catch (e) {
    // server busy — চুপ
  }
}

// ── Poll token status ────────────────────────────────────────
async function pollStatus() {
  try {
    const resp = await fetch('/token_status');
    const data = await resp.json();

    const cnt      = data.total_tokens || 0;
    const checking = data.checking_mode || false;
    const nextTs   = data.next_refresh_ts || 0;

    // token count
    document.getElementById('statTokens').textContent = cnt;
    document.getElementById('tokenCount').textContent = `TOKENS: ${cnt}`;

    // status badge
    const badge = document.getElementById('statusBadge');
    if (checking) {
      badge.className = 'status-badge checking';
      badge.textContent = '⚠ CHECKING';
    } else if (cnt === 0) {
      badge.className = 'status-badge loading';
      badge.textContent = '● LOADING';
    } else {
      badge.className = 'status-badge online';
      badge.textContent = '● ONLINE  ' + cnt + ' TOKENS';
    }

    // countdown
    if (nextTs > 0) {
      const now  = Math.floor(Date.now() / 1000);
      const diff = Math.max(0, nextTs - now);
      const h    = String(Math.floor(diff / 3600)).padStart(2, '0');
      const m    = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
      const s    = String(diff % 60).padStart(2, '0');
      document.getElementById('statRefresh').innerHTML =
        `NEXT: <span>${h}:${m}:${s}</span>`;
    }
  } catch (e) {
    // ignore
  }
}

// ── Start ────────────────────────────────────────────────────
// প্রথমবার সব log নিয়ে আসো
(async () => {
  try {
    const resp = await fetch('/logs/all');
    const data = await resp.json();
    if (data.lines && data.lines.length > 0) {
      data.lines.forEach(l => appendLine(l.msg));
      lastLogId = data.lines[data.lines.length - 1].id;
    } else {
      appendLine('[SYSTEM] Waiting for token generation to start...');
    }
  } catch (e) {
    appendLine('[SYSTEM] Server connecting...');
  }
})();

// প্রতি ৩ সেকেন্ডে নতুন logs
setInterval(pollLogs,   3000);
// প্রতি ৫ সেকেন্ডে status
setInterval(pollStatus, 5000);
pollStatus();
</script>
</body>
</html>
